server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /admin {
        default_type application/json;
        return 200 '{"status": "admin", "secret": "internal_admin_token_xyz", "users": [{"id": 1, "role": "superadmin", "api_key": "sk-admin-key-xyz789"}]}';
    }

    location /api/internal {
        default_type application/json;
        return 200 '{"internal": true, "database_host": "db.internal:5432", "redis_host": "redis.internal:6379", "secret_token": "internal-service-token-abc"}';
    }

    location /health {
        default_type application/json;
        return 200 '{"status": "healthy", "service": "internal-api"}';
    }
}
